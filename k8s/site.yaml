# MacTranscribe site — Astro SSR (Node). Source shipped as a content-hashed ConfigMap
# (no registry), extracted + built + run on node:22-alpine. Isolated namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: mactranscribe-site
  labels: { pod-security.kubernetes.io/enforce: baseline }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: astro-src-a6022fd438, namespace: mactranscribe-site }
binaryData:
  src.tgz: 
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site, namespace: mactranscribe-site }
spec:
  replicas: 1
  selector: { matchLabels: { app: site } }
  template:
    metadata: { labels: { app: site } }
    spec:
      initContainers:
        - name: extract
          image: node:22-alpine
          command: ["sh","-c","tar xzf /src/src.tgz -C /app && echo extracted"]
          volumeMounts: [{ name: app, mountPath: /app }, { name: src, mountPath: /src }]
      containers:
        - name: web
          image: node:22-alpine
          workingDir: /app
          command: ["sh","-c","npm install --no-audit --no-fund && npm run build && HOST=0.0.0.0 PORT=4321 node ./dist/server/entry.mjs"]
          ports: [{ containerPort: 4321 }]
          envFrom: [{ secretRef: { name: site-secrets } }]
          volumeMounts: [{ name: app, mountPath: /app }]
          readinessProbe:
            httpGet: { path: /api/health, port: 4321 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 50
          resources:
            requests: { memory: 512Mi, cpu: 250m }
            limits: { memory: 1Gi }
      volumes:
        - { name: app, emptyDir: {} }
        - { name: src, configMap: { name: astro-src-a6022fd438 } }
---
apiVersion: v1
kind: Service
metadata: { name: site, namespace: mactranscribe-site }
spec:
  selector: { app: site }
  ports: [{ port: 80, targetPort: 4321 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site
  namespace: mactranscribe-site
  annotations: { cert-manager.io/cluster-issuer: letsencrypt-prod }
spec:
  ingressClassName: nginx
  tls: [{ hosts: [mactranscribe.michaeltabet.com], secretName: mactranscribe-site-tls }]
  rules:
    - host: mactranscribe.michaeltabet.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: site, port: { number: 80 } } }
